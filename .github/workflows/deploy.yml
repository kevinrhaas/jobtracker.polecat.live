name: Deploy to GitHub Pages

# Static site — no build step. The SINGLE deploy authority for the site,
# served at the custom domain (see CNAME: jobtracker.polecat.live). Runs on:
#   • push to main (your own commits, and steward PR merges)
#   • completion of the self-improvement fallback workflow (its bot commits to
#     main but a GITHUB_TOKEN push can't trigger `push` here, so we listen for
#     that workflow finishing instead)
#   • manual dispatch
on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Self-improvement (dispatch-only fallback)"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time to the github-pages environment; let an in-progress
# deploy finish before the next starts (prevents "deployment_queued" stalls).
# (self-improve.yml no longer deploys Pages itself — it has its own group.)
concurrency:
  group: jobtracker-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repo (index.html, app/, css/, js/, assets, CNAME).
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
