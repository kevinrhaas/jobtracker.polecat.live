name: Self-improvement (dispatch-only fallback)

# DISPATCH-ONLY FALLBACK — superseded by the polecat-platform steward.
#
# Scheduled self-improvement for this app now runs centrally from
# kevinrhaas/polecat-platform (.github/workflows/steward-improve.yml — focus
# mode with app=jobtracker.polecat.live), per docs/AUTOMATION.md in that repo.
# This workflow remains ONLY as a manual fallback: run it from the Actions tab
# (workflow_dispatch) if the steward is unavailable. Its schedule stays
# commented out permanently, and the file is slated for DELETION once the
# steward has ~3 weeks of solid runs.
#
# What a run does: build the next ROADMAP item (or, every 5th run, a polish/
# reflection sweep), stamp the changelog, gate behind the smoke test, archive
# a /v/<n>/ release snapshot, then commit to main. Deployment is NOT done
# here — this repo's "Deploy to GitHub Pages" workflow is the single deploy
# authority and listens for this workflow's completion (workflow_run), since
# a GITHUB_TOKEN push to main cannot trigger its `push` event.
on:
  # Superseded by the platform steward (see header) — do not re-enable.
  # schedule:
  #   - cron: '19,49 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

# Never let two improvement runs overlap.
concurrency:
  group: self-improve
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code + test browser
        run: |
          npm install -g @anthropic-ai/claude-code
          npm install -D playwright
          # Chromium AND WebKit: WebKit is iOS Safari/Chrome's engine and catches
          # iOS-only failures (e.g. Intl.format throwing on an invalid Date) that
          # Chromium silently tolerates. The mobile blank-screen class of bug is
          # only reproducible on WebKit, so the smoke test runs on both.
          npx playwright install --with-deps chromium webkit

      # Every 5th run is a polish/reflection sweep; the rest build features.
      - name: Pick mode
        id: mode
        run: |
          if [ $(( ${{ github.run_number }} % 5 )) -eq 0 ]; then
            echo "mode=polish"  >> "$GITHUB_OUTPUT"
          else
            echo "mode=feature" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          PROMPT="$(cat .github/self-improve-prompt.md)
          ---
          This run's mode is: ${MODE}"
          claude -p "$PROMPT" \
            --dangerously-skip-permissions \
            --max-turns 120 \
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep" || echo "claude exited non-zero (continuing to smoke test)"

      - name: Record run cadence
        run: |
          mkdir -p .github
          echo "$(date -u +%FT%TZ) run=${{ github.run_number }} mode=${MODE}" >> .github/cadence.log
        env:
          MODE: ${{ steps.mode.outputs.mode }}

      - name: Stamp changelog timestamps
        run: |
          if git diff --name-only | grep -q '^js/changelog.js$'; then
            node .github/stamp-changelog.mjs
          else
            echo "changelog.js unchanged; nothing to stamp."
          fi

      - name: Smoke test (marketing + app must load with no errors)
        run: node .github/smoke-test.mjs

      # Freeze this build as an immutable /v/<n>/ snapshot AFTER it passes the
      # smoke test, so the Settings → Version switcher can roll back to it later.
      - name: Archive this release
        run: node .github/archive-release.mjs

      - name: Commit + push to main (triggers the deploy workflow)
        env:
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes produced this run."; exit 0
          fi
          git config user.name  "jobtracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "auto: self-improvement (${MODE})" \
            -m "Automated improvement run; passed smoke test. Deploy runs via the Deploy to GitHub Pages workflow."
          # Integrate any commits that landed on main during this run (the owner
          # pushes to main too), then push. Retry with rebase so a concurrent
          # push never causes a non-fast-forward failure or lost work.
          pushed=false
          for i in 1 2 3 4 5; do
            git fetch origin main
            # On the rare true conflict, prefer main (the owner's pushes win).
            if git rebase origin/main; then :; else git rebase --abort; git merge -X theirs origin/main -m "merge main"; fi
            if git push origin HEAD:main; then pushed=true; break; fi
            sleep $((3*i))
          done
          if [ "$pushed" != true ]; then echo "Could not push to main after retries"; exit 1; fi
