<!doctype html>
<html lang="en" data-palette="ada" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="description" content="JobTracker — the ADA Agency creative job console. Track, manage, and deliver marketing jobs end to end."/>
  <meta name="theme-color" content="#0b0a16"/>
  <title>JobTracker · ADA Agency</title>
  <link rel="icon" type="image/svg+xml" href="/v/1/favicon.svg"/>
  <link rel="stylesheet" href="/v/1/css/styles.css"/>
  <!-- Apply saved theme + reduced-motion before first paint to avoid a flash. -->
  <script>
    (function(){try{
      var raw=localStorage.getItem('jt.theme.v1')||'ada:dark';
      var parts=raw.split(':'), palette=parts[0]||'ada', mode=parts[1]||'dark';
      if(mode==='system') mode=matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';
      var r=document.documentElement;
      r.setAttribute('data-palette',palette); r.setAttribute('data-theme',mode);
      var cfg=JSON.parse(localStorage.getItem('jt.workspace')||'{}');
      if(cfg&&cfg.config&&cfg.config.settings&&cfg.config.settings.reduceMotion) r.setAttribute('data-reduce-motion','1');
    }catch(e){}})();
  </script>
</head>
<body>
  <div class="aurora" aria-hidden="true"><span></span><span></span><span></span></div>
  <div id="app"></div>
  <div id="toasts"></div>
  <script type="module" src="/v/1/js/app.js"></script>
<div id="__archived" role="status" style="position:fixed;left:0;right:0;bottom:0;z-index:2147483000;display:flex;gap:14px;align-items:center;justify-content:center;padding:8px 16px;font:600 13px/-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:#fff;background:linear-gradient(135deg,#fbbf24,#d97706);box-shadow:0 -6px 20px rgba(0,0,0,.25)">
  <span style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif">You're viewing <b>v1</b> — an archived build</span>
  <button onclick="try{var k='jt.workspace',d=JSON.parse(localStorage.getItem(k)||'{}');if(d&&d.config&&d.config.settings){d.config.settings.pinnedVersion='current';localStorage.setItem(k,JSON.stringify(d));}}catch(e){}location.href='/app/';" style="cursor:pointer;border:1px solid rgba(255,255,255,.5);background:rgba(255,255,255,.22);color:#fff;border-radius:8px;padding:5px 12px;font:600 13px -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif">Return to latest</button>
</div>
</body>
</html>
