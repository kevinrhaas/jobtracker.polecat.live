<!doctype html>
<html lang="en" data-palette="ada" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="description" content="JobTracker — the agency creative job console. Track, manage, and deliver marketing jobs end to end."/>
  <meta name="theme-color" content="#0a0f1a"/>
  <title>JobTracker</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="apple-touch-icon" href="/favicon.svg"/>
  <link rel="manifest" href="/manifest.json"/>
  <!-- Polecat Shell (vendored): design tokens first, then the shell chrome;
       the app's own stylesheet loads last so it can skin/override both. -->
  <link rel="stylesheet" href="/vendor/polecat-shell/tokens.css"/>
  <link rel="stylesheet" href="/vendor/polecat-shell/shell.css"/>
  <link rel="stylesheet" href="/css/styles.css"/>
  <!-- Apply saved theme + reduced-motion before first paint to avoid a flash. -->
  <script>
    (function(){try{
      var raw=localStorage.getItem('jt.theme.v1')||'ada:dark';
      var parts=raw.split(':'), palette=parts[0]||'ada', mode=parts[1]||'dark';
      if(mode==='system') mode=matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';
      var r=document.documentElement;
      r.setAttribute('data-palette',palette); r.setAttribute('data-theme',mode);
      var cfg=JSON.parse(localStorage.getItem('jt.workspace')||'{}');
      if(cfg&&cfg.config&&cfg.config.settings&&cfg.config.settings.reduceMotion) r.setAttribute('data-reduce-motion','1');
    }catch(e){}})();
  </script>
</head>
<body>
  <div class="aurora" aria-hidden="true"><span></span><span></span><span></span></div>
  <div id="app"></div>
  <div id="toasts"></div>
  <script type="module" src="/js/app.js"></script>
  <script>
    // Offline app shell — scoped to /app/ only so it never shadows the
    // marketing site or archived /v/<n>/ build snapshots.
    if('serviceWorker' in navigator){
      window.addEventListener('load', ()=>{
        navigator.serviceWorker.register('/sw.js', { scope:'/app/' }).catch(()=>{});
      });
    }
  </script>
</body>
</html>
