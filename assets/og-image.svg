    <text x="120" y="509">Dashboard · Board</text>
    <rect x="340" y="474" width="210" height="54" rx="27" fill="#18243a" stroke="#26344f"/>
    <text x="368" y="509">Calendar · KPIs</text>
    <rect x="570" y="474" width="250" height="54" rx="27" fill="#18243a" stroke="#26344f"/>
    <text x="598" y="509">Import · Export</text>
