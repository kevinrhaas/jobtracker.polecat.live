<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Agency Job Tracker">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1a"/><stop offset="1" stop-color="#111d31"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a8fd6"/><stop offset="1" stop-color="#12a24f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1000" cy="120" r="360" fill="#1a8fd6" opacity="0.18"/>
  <circle cx="180" cy="560" r="320" fill="#12a24f" opacity="0.14"/>
  <g transform="translate(90,150)">
    <rect width="104" height="104" rx="26" fill="url(#brand)"/>
    <g transform="translate(30,30)" fill="none" stroke="#fff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
