  </g>
  <text x="90" y="360" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="76" font-weight="800" fill="#ecebfb">Agency Job Tracker</text>
  <text x="92" y="428" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="34" font-weight="500" fill="#a49ed0">Track every creative job, end to end.</text>
  <g font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="24" font-weight="600" fill="#c9c3ee">
